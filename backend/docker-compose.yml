services:
  db:
    image: postgres:18
    container_name: keepeat-db
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - keepeat-db-data:/var/lib/postgresql

volumes:
  keepeat-db-data: